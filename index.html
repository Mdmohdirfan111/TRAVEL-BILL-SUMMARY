<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Bill Summary Generator</title>
    <style>
        :root {
            --primary-color: #1e3a8a;
            --secondary-color: #3b82f6;
            --success-color: #10b981;
            --danger-color: #ef4444;
            --background-color: #f8fafc;
            --card-background: #ffffff;
            --text-color: #1e293b;
            --border-color: #cbd5e1;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--background-color);
            color: var(--text-color);
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: var(--card-background);
            width: 100%;
            max-width: 800px;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -4px rgba(0, 0, 0, 0.1);
        }

        .header-title {
            text-align: center;
            color: var(--primary-color);
            margin-bottom: 25px;
            font-size: 24px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 3px solid var(--primary-color);
            padding-bottom: 10px;
        }

        .meta-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
            background: #f1f5f9;
            padding: 15px;
            border-radius: 8px;
            border-left: 5px solid var(--secondary-color);
        }

        .input-group {
            display: flex;
            flex-direction: column;
        }

        .input-group label {
            font-size: 12px;
            font-weight: 600;
            color: #64748b;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .input-group input {
            padding: 8px 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-group input:focus {
            border-color: var(--secondary-color);
        }

        .table-responsive {
            overflow-x: auto;
            margin-bottom: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            font-size: 14px;
        }

        th {
            background-color: var(--primary-color);
            color: white;
            padding: 12px;
            font-weight: 600;
        }

        td {
            padding: 10px 12px;
            border-bottom: 1px solid #e2e8f0;
            background: white;
        }

        tr:nth-child(even) td {
            background-color: #f8fafc;
        }

        input.table-input {
            width: 100%;
            padding: 6px 10px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-size: 14px;
            outline: none;
        }

        input.table-input:focus {
            border-color: var(--secondary-color);
        }

        .text-right {
            text-align: right;
        }

        .amount-col {
            font-weight: 600;
            color: #334155;
            padding-right: 15px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background-color: var(--secondary-color);
            color: white;
        }

        .btn-primary:hover {
            background-color: #2563eb;
        }

        .btn-success {
            background-color: var(--success-color);
            color: white;
            width: 100%;
            justify-content: center;
            margin-top: 15px;
            font-size: 16px;
            padding: 12px;
        }

        .btn-success:hover {
            background-color: #059669;
        }

        .btn-danger {
            background-color: transparent;
            color: var(--danger-color);
            padding: 4px 8px;
        }

        .btn-danger:hover {
            background-color: #fee2e2;
        }

        .action-actions {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .summary-section {
            margin-top: 20px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 15px;
            margin-left: auto;
            max-width: 350px;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            font-size: 15px;
        }

        .summary-row.total {
            border-bottom: 1px dashed var(--border-color);
            font-weight: 600;
            color: var(--primary-color);
        }

        .summary-row.advance {
            border-bottom: 1px dashed var(--border-color);
            align-items: center;
        }

        .summary-row.advance input {
            width: 120px;
            text-align: right;
            padding: 4px 8px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-weight: 600;
        }

        .summary-row.balance {
            font-size: 18px;
            font-weight: 700;
            color: #c2410c;
            padding-top: 12px;
        }

        /* Print Styles Optimized for A4 Portrait */
        @media print {
            body {
                background-color: white;
                color: black;
                padding: 0;
            }

            .container {
                box-shadow: none;
                padding: 0;
                max-width: 100%;
            }

            .no-print {
                display: none !important;
            }

            .meta-grid {
                background: #f8fafc !important;
                border-left: 5px solid #1e3a8a !important;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }

            th {
                background-color: #1e3a8a !important;
                color: white !important;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }

            tr:nth-child(even) td {
                background-color: #f8fafc !important;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }

            .summary-section {
                background: #f8fafc !important;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }

            input {
                border: none !important;
                background: transparent !important;
                padding: 0 !important;
                font-size: 14px !important;
            }
            
            input::-webkit-outer-spin-button,
            input::-webkit-inner-spin-button {
                -webkit-appearance: none;
                margin: 0;
            }

            @page {
                size: A4 portrait;
                margin: 15mm 10mm;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-title">Travel Bill Summary</div>

    <!-- Metadata Fields -->
    <div class="meta-grid">
        <div class="input-group">
            <label>Month</label>
            <input type="text" id="billMonth" placeholder="e.g. JUNE 2026">
        </div>
        <div class="input-group">
            <label>Location</label>
            <input type="text" id="billLocation" placeholder="e.g. Pune 2">
        </div>
        <div class="input-group">
            <label>Vehicle Number</label>
            <input type="text" id="billVehicle" placeholder="e.g. MH04MR0516">
        </div>
    </div>

    <!-- Actions -->
    <div class="action-actions no-print">
        <button class="btn btn-primary" onclick="addRow()">+ Add New Row</button>
    </div>

    <!-- Dynamic Table -->
    <div class="table-responsive">
        <table id="billTable">
            <thead>
                <tr>
                    <th style="width: 40%;">Particulars</th>
                    <th style="width: 20%; text-align: right;">Rate (₹)</th>
                    <th style="width: 15%; text-align: center;">Qty</th>
                    <th style="width: 20%; text-align: right;">₹ Amount</th>
                    <th style="width: 5%;" class="no-print"></th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <!-- Pre-populated Row 1 -->
                <tr>
                    <td><input type="text" class="table-input core-row" value="KM Run" readonly></td>
                    <td><input type="number" class="table-input text-right rate-input" value="7.5" oninput="calculateRow(this)"></td>
                    <td><input type="number" class="table-input text-center qty-input" value="9752" oninput="calculateRow(this)"></td>
                    <td class="text-right amount-col">73140.00</td>
                    <td class="no-print"></td>
                </tr>
                <!-- Pre-populated Row 2 -->
                <tr>
                    <td><input type="text" class="table-input core-row" value="Package" readonly></td>
                    <td><input type="number" class="table-input text-right rate-input" value="45000" oninput="calculateRow(this)"></td>
                    <td><input type="number" class="table-input text-center qty-input" value="" placeholder="1" oninput="calculateRow(this)"></td>
                    <td class="text-right amount-col">45000.00</td>
                    <td class="no-print"></td>
                </tr>
                <!-- Pre-populated Row 3 -->
                <tr>
                    <td><input type="text" class="table-input core-row" value="Toll" readonly></td>
                    <td><input type="number" class="table-input text-right rate-input" value="26826" oninput="calculateRow(this)"></td>
                    <td><input type="number" class="table-input text-center qty-input" value="" placeholder="1" oninput="calculateRow(this)"></td>
                    <td class="text-right amount-col">26826.00</td>
                    <td class="no-print"></td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- Summary / Total Calculations -->
    <div class="summary-section">
        <div class="summary-row total">
            <span>Total Amount:</span>
            <span id="totalAmount">₹ 0.00</span>
        </div>
        <div class="summary-row advance">
            <span>Advance Received:</span>
            <div>₹ <input type="number" id="advanceInput" value="70000" oninput="calculateGrandTotal()"></div>
        </div>
        <div class="summary-row balance">
            <span>Balance Due:</span>
            <span id="balanceOutstanding">₹ 0.00</span>
        </div>
    </div>

    <!-- Download PDF Button -->
    <button class="btn btn-success no-print" onclick="window.print()">
        Download / Print PDF
    </button>
</div>

<script>
    function calculateRow(element) {
        const row = element.closest('tr');
        const rate = parseFloat(row.querySelector('.rate-input').value) || 0;
        const qtyInput = row.querySelector('.qty-input').value;
        
        let amount = 0;
        if (qtyInput === '' || qtyInput === null) {
            amount = rate; // If Qty is blank, amount is just the Rate
        } else {
            amount = rate * (parseFloat(qtyInput) || 0);
        }
        
        row.querySelector('.amount-col').textContent = amount.toFixed(2);
        calculateGrandTotal();
    }

    function addRow() {
        const tbody = document.getElementById('tableBody');
        const tr = document.createElement('tr');
        
        tr.innerHTML = `
            <td><input type="text" class="table-input" placeholder="Enter Description"></td>
            <td><input type="number" class="table-input text-right rate-input" value="" placeholder="0" oninput="calculateRow(this)"></td>
            <td><input type="number" class="table-input text-center qty-input" value="" placeholder="1" oninput="calculateRow(this)"></td>
            <td class="text-right amount-col">0.00</td>
            <td class="no-print text-center"><button class="btn btn-danger" onclick="deleteRow(this)">✕</button></td>
        `;
        tbody.appendChild(tr);
    }

    function deleteRow(button) {
        const row = button.closest('tr');
        row.remove();
        calculateGrandTotal();
    }

    function calculateGrandTotal() {
        const amountCols = document.querySelectorAll('.amount-col');
        let total = 0;
        
        amountCols.forEach(col => {
            total += parseFloat(col.textContent) || 0;
        });
        
        const advance = parseFloat(document.getElementById('advanceInput').value) || 0;
        const balance = total - advance;
        
        document.getElementById('totalAmount').textContent = '₹ ' + total.toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        document.getElementById('balanceOutstanding').textContent = '₹ ' + balance.toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    // Initial Calculation on Load
    window.onload = function() {
        // Set dynamic inputs defaults if needed
        document.getElementById('billMonth').value = 'JUNE 2026';
        document.getElementById('billLocation').value = 'Pune 2';
        document.getElementById('billVehicle').value = 'MH04MR0516';
        calculateGrandTotal();
    };
</script>
</body>
</html>
