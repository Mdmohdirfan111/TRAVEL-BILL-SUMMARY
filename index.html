<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Bill Summary Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-color: #0f2f66;
            --primary-dark: #081d42;
            --secondary-color: #2563eb;
            --accent-color: #f97316;
            --success-color: #10b981;
            --success-dark: #059669;
            --danger-color: #ef4444;
            --background-color: #eef2f8;
            --card-background: #ffffff;
            --text-color: #1e293b;
            --muted-color: #64748b;
            --border-color: #cbd5e1;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: radial-gradient(circle at top left, #dbe6f9 0%, var(--background-color) 45%, #e6ecf7 100%);
            color: var(--text-color);
            padding: 24px 16px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }

        .page-wrap {
            width: 100%;
            max-width: 800px;
        }

        .container {
            background-color: var(--card-background);
            width: 100%;
            padding: 34px 32px 26px;
            border-radius: 16px;
            box-shadow: 0 20px 40px -12px rgba(15, 47, 102, 0.18), 0 4px 6px -4px rgba(0, 0, 0, 0.08);
            position: relative;
            overflow: hidden;
        }

        .container::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 6px;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color), var(--accent-color));
        }

        .header-title {
            text-align: center;
            color: var(--primary-color);
            margin-bottom: 4px;
            font-family: 'Poppins', sans-serif;
            font-size: 26px;
            font-weight: 800;
            letter-spacing: 1px;
        }

        .header-sub {
            text-align: center;
            color: var(--muted-color);
            font-size: 12.5px;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 18px;
        }

        .header-divider {
            height: 3px;
            width: 70px;
            background: linear-gradient(90deg, var(--primary-color), var(--accent-color));
            margin: 0 auto 24px;
            border-radius: 3px;
        }

        .meta-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
            gap: 15px;
            margin-bottom: 22px;
            background: #f1f5f9;
            padding: 16px 18px;
            border-radius: 10px;
            border-left: 5px solid var(--secondary-color);
        }

        .input-group {
            display: flex;
            flex-direction: column;
        }

        .input-group label {
            font-size: 11.5px;
            font-weight: 700;
            color: var(--muted-color);
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-group input,
        .input-group textarea {
            padding: 9px 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            background: #fff;
        }

        .input-group input:focus,
        .input-group textarea:focus,
        .table-input:focus,
        #advanceInput:focus {
            border-color: var(--secondary-color);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
        }

        .table-responsive {
            overflow-x: auto;
            margin-bottom: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.06);
            border: 1px solid var(--border-color);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            font-size: 14px;
        }

        th, td {
            border: 1px solid var(--border-color);
        }

        th {
            background-color: var(--primary-color);
            color: white;
            padding: 12px;
            font-weight: 600;
            border-color: var(--primary-dark);
        }

        td {
            padding: 10px 12px;
            background: white;
        }

        tr:nth-child(even) td {
            background-color: #f8fafc;
        }

        input.table-input {
            width: 100%;
            padding: 6px 10px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-size: 14px;
            outline: none;
        }

        .text-right { text-align: right; }
        .text-center { text-align: center; }

        .amount-col {
            font-weight: 600;
            color: #334155;
            padding-right: 15px;
            white-space: nowrap;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background-color: var(--secondary-color);
            color: white;
        }
        .btn-primary:hover { background-color: #1d4ed8; transform: translateY(-1px); }

        .btn-outline {
            background: transparent;
            color: var(--muted-color);
            border: 1px solid var(--border-color);
        }
        .btn-outline:hover { background: #f1f5f9; color: var(--text-color); }

        .btn-success {
            background: linear-gradient(135deg, var(--success-color), var(--success-dark));
            color: white;
            width: 100%;
            justify-content: center;
            margin-top: 16px;
            font-size: 16px;
            padding: 13px;
            box-shadow: 0 8px 16px -6px rgba(16, 185, 129, 0.5);
        }
        .btn-success:hover { transform: translateY(-1px); box-shadow: 0 10px 20px -6px rgba(16, 185, 129, 0.6); }

        .btn-danger {
            background-color: transparent;
            color: var(--danger-color);
            padding: 4px 8px;
        }

        .action-actions {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .summary-section {
            margin-top: 6px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            padding: 16px 18px;
            margin-left: auto;
            max-width: 350px;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            font-size: 15px;
            gap: 10px;
        }

        .summary-row.total {
            border-bottom: 1px dashed var(--border-color);
            font-weight: 600;
            color: var(--primary-color);
        }

        .summary-row.advance {
            border-bottom: 1px dashed var(--border-color);
        }

        .advance-value-wrap {
            display: flex;
            align-items: center;
            gap: 4px;
            font-weight: 600;
        }

        .summary-row.advance input {
            width: 120px;
            text-align: right;
            padding: 4px 8px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-weight: 600;
        }

        .summary-row.balance {
            font-size: 18px;
            font-weight: 700;
            color: #c2410c;
            padding-top: 12px;
        }

        .footer-note {
            text-align: center;
            margin-top: 22px;
            padding-top: 14px;
            border-top: 1px solid #e2e8f0;
            font-size: 12px;
            color: var(--muted-color);
            letter-spacing: 0.3px;
        }
        .footer-note span {
            color: var(--secondary-color);
            font-weight: 700;
        }

        @media (max-width: 500px) {
            .container { padding: 22px 16px 18px; }
            .header-title { font-size: 21px; }
        }

        /* Applied only while the PDF snapshot is being taken */
        .pdf-mode {
            box-shadow: none !important;
            border-radius: 0 !important;
        }
        .pdf-mode input,
        .pdf-mode textarea {
            border: none !important;
            background: transparent !important;
            padding: 0 !important;
            box-shadow: none !important;
            -webkit-appearance: none;
            appearance: none;
        }
        .pdf-mode input[type="number"]::-webkit-inner-spin-button,
        .pdf-mode input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        .pdf-mode .no-print {
            display: none !important;
        }
    </style>
</head>
<body>

<div class="page-wrap">
<div class="container" id="billContainer">
    <div class="header-title">Travel Bill Summary</div>
    <div class="header-sub">Fare &amp; Expense Statement</div>
    <div class="header-divider"></div>

    <div class="meta-grid">
        <div class="input-group">
            <label>Month</label>
            <input type="text" id="billMonth" placeholder="e.g. JUNE 2026">
        </div>
        <div class="input-group">
            <label>Route</label>
            <input type="text" id="billLocation" placeholder="Enter Route">
        </div>
        <div class="input-group">
            <label>Vehicle Number</label>
            <input type="text" id="billVehicle" placeholder="Enter Vehicle No.">
        </div>
    </div>

    <div class="action-actions no-print">
        <button class="btn btn-primary" onclick="addRow()">+ Add New Row</button>
        <button class="btn btn-outline" onclick="resetForm()">Reset Form</button>
    </div>

    <div class="table-responsive">
        <table id="billTable">
            <thead>
                <tr>
                    <th style="width: 40%;">Particulars</th>
                    <th style="width: 20%; text-align: right;">Rate (₹)</th>
                    <th style="width: 15%; text-align: center;">Qty</th>
                    <th style="width: 20%; text-align: right;">₹ Amount</th>
                    <th style="width: 5%;" class="no-print"></th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr>
                    <td><input type="text" class="table-input core-row" value="Kilometer Run" readonly></td>
                    <td><input type="number" class="table-input text-right rate-input" value="" placeholder="0" oninput="calculateRow(this)"></td>
                    <td><input type="number" class="table-input text-center qty-input" value="" placeholder="e.g. 9752" oninput="calculateRow(this)"></td>
                    <td class="text-right amount-col">0.00</td>
                    <td class="no-print"></td>
                </tr>
                <tr>
                    <td><input type="text" class="table-input core-row" value="Package" readonly></td>
                    <td><input type="number" class="table-input text-right rate-input" value="" placeholder="0" oninput="calculateRow(this)"></td>
                    <td><input type="number" class="table-input text-center qty-input" value="" placeholder="" oninput="calculateRow(this)"></td>
                    <td class="text-right amount-col">0.00</td>
                    <td class="no-print"></td>
                </tr>
                <tr>
                    <td><input type="text" class="table-input core-row" value="Toll" readonly></td>
                    <td><input type="number" class="table-input text-right rate-input" value="" placeholder="0" oninput="calculateRow(this)"></td>
                    <td><input type="number" class="table-input text-center qty-input" value="" placeholder="" oninput="calculateRow(this)"></td>
                    <td class="text-right amount-col">0.00</td>
                    <td class="no-print"></td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="summary-section">
        <div class="summary-row total">
            <span>Total Amount:</span>
            <span id="totalAmount">₹ 0.00</span>
        </div>
        <div class="summary-row advance">
            <span>Advance Received:</span>
            <div class="advance-value-wrap">₹ <input type="number" id="advanceInput" value="" placeholder="0" oninput="calculateGrandTotal()"></div>
        </div>
        <div class="summary-row balance">
            <span>Balance Due:</span>
            <span id="balanceOutstanding">₹ 0.00</span>
        </div>
    </div>

    <div class="footer-note">  <span> </span></div>
</div>

<button class="btn btn-success no-print" id="downloadBtn" style="max-width:800px;width:100%;margin-top:16px;" onclick="downloadPDF()">
    Download PDF
</button>
</div>

<script>
    function calculateRow(element) {
        const row = element.closest('tr');
        const rate = parseFloat(row.querySelector('.rate-input').value) || 0;
        const qtyInput = row.querySelector('.qty-input').value;

        let amount = 0;
        if (qtyInput === '' || qtyInput === null) {
            amount = rate;
        } else {
            amount = rate * (parseFloat(qtyInput) || 0);
        }

        row.querySelector('.amount-col').textContent = amount.toFixed(2);
        calculateGrandTotal();
    }

    function addRow() {
        const tbody = document.getElementById('tableBody');
        const tr = document.createElement('tr');

        tr.innerHTML = `
            <td><input type="text" class="table-input" placeholder="Enter Description"></td>
            <td><input type="number" class="table-input text-right rate-input" value="" placeholder="0" oninput="calculateRow(this)"></td>
            <td><input type="number" class="table-input text-center qty-input" value="" placeholder="" oninput="calculateRow(this)"></td>
            <td class="text-right amount-col">0.00</td>
            <td class="no-print text-center"><button class="btn btn-danger" onclick="deleteRow(this)">✕</button></td>
        `;
        tbody.appendChild(tr);
    }

    function deleteRow(button) {
        const row = button.closest('tr');
        row.remove();
        calculateGrandTotal();
    }

    function resetForm() {
        if (!confirm('Clear all fields and start a new bill?')) return;
        document.getElementById('billMonth').value = '';
        document.getElementById('billLocation').value = '';
        document.getElementById('billVehicle').value = '';
        document.getElementById('advanceInput').value = '';
        document.querySelectorAll('.rate-input, .qty-input').forEach(i => i.value = '');
        document.querySelectorAll('.amount-col').forEach(c => c.textContent = '0.00');
        // remove any extra rows beyond the original 3
        const rows = document.querySelectorAll('#tableBody tr');
        rows.forEach((row, idx) => { if (idx > 2) row.remove(); });
        calculateGrandTotal();
    }

    function calculateGrandTotal() {
        const amountCols = document.querySelectorAll('.amount-col');
        let total = 0;

        amountCols.forEach(col => {
            total += parseFloat(col.textContent) || 0;
        });

        const advance = parseFloat(document.getElementById('advanceInput').value) || 0;
        const balance = total - advance;

        document.getElementById('totalAmount').textContent = '₹ ' + total.toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        document.getElementById('balanceOutstanding').textContent = '₹ ' + balance.toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    // Direct PDF Generation Logic
    // Captures the bill exactly as shown on screen, then scales the resulting
    // image down (if needed) so the entire bill always fits on ONE A4 page,
    // instead of letting it get sliced across multiple pages.
    async function downloadPDF() {
        const container = document.getElementById('billContainer');
        const monthValue = document.getElementById('billMonth').value || 'Travel_Bill';
        const downloadBtn = document.getElementById('downloadBtn');

        downloadBtn.disabled = true;
        downloadBtn.textContent = 'Generating PDF...';

        // Switch to clean, borderless "print" styling for the snapshot
        container.classList.add('pdf-mode');

        // Let the browser repaint with the new styles before capturing
        await new Promise(resolve => setTimeout(resolve, 50));

        try {
            const canvas = await html2canvas(container, {
                scale: 2,
                useCORS: true,
                backgroundColor: '#ffffff'
            });

            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF('p', 'mm', 'a4');

            const pageWidth = pdf.internal.pageSize.getWidth();
            const pageHeight = pdf.internal.pageSize.getHeight();
            const margin = 10;
            const maxWidth = pageWidth - margin * 2;
            const maxHeight = pageHeight - margin * 2;

            // Convert canvas pixel size to mm at 96dpi, then scale to fit
            const pxToMm = 25.4 / 96;
            const imgWidthMm = canvas.width * pxToMm / 2;   // divide by html2canvas scale factor
            const imgHeightMm = canvas.height * pxToMm / 2;

            const scaleFactor = Math.min(maxWidth / imgWidthMm, maxHeight / imgHeightMm, 1);
            const finalWidth = imgWidthMm * scaleFactor;
            const finalHeight = imgHeightMm * scaleFactor;

            const offsetX = (pageWidth - finalWidth) / 2;
            const offsetY = margin;

            const imgData = canvas.toDataURL('image/jpeg', 0.98);
            pdf.addImage(imgData, 'JPEG', offsetX, offsetY, finalWidth, finalHeight);
            pdf.save(`${monthValue.replace(/\s+/g, '_')}_Summary.pdf`);
        } catch (err) {
            alert('PDF generate karne mein dikkat aayi. Dobara try karein.');
            console.error(err);
        } finally {
            container.classList.remove('pdf-mode');
            downloadBtn.disabled = false;
            downloadBtn.textContent = 'Download PDF';
        }
    }
</script>
</body>
</html>
